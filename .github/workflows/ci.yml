name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Backend verify
        run: docker compose run --rm backend uv run --extra dev python scripts/verify.py

      - name: Frontend build
        run: docker compose run --rm --no-deps frontend npm run build

      - name: Cleanup
        if: always()
        run: docker compose down --remove-orphans
